<h1>Test angular app</h1>
<igds-radio-group
  label="Select button variants"
  orientation="vertical"
  (igds-change)="handleChange($event)"
  >
  @for (buttonVar of buttonVariants; track buttonVar) {
    <igds-radio name="radio" [value]="buttonVar" [label]="buttonVar"/>
  }
</igds-radio-group>

<br /><br />

<igds-button class="button" [variant]="variant()" size="medium">
  Example button
</igds-button>

<br /><br />

<h2>Input below has a value: {{inputValue()}} (based on signal)</h2>
<igds-input
  dir="ltr"
  type="text"
  label="Demo input:"
  placeholder="Enter value..."
  [value]="inputValue()"
  (igds-input)="handleInput($event)"
></igds-input>

<br /><br />

<form [formGroup]="form" (ngSubmit)="submit($event)">
  <igds-input [defaultValue]="''" formControlName="input" dir="ltr"></igds-input>
  <br />
  <igds-button variant="primary" size="small" type="submit">
    Submit
  </igds-button>
</form>

<br /><br />

<h2>Input below has a value: {{inputValue2}}</h2>
<igds-input [(value)]="inputValue2" dir="ltr"></igds-input>

<h2>Table example</h2>
<igds-table [selectable]="true" (igds-row-select)="handleRowSelection($event)">
  <igds-table-header
    [columns]="[
      {id: '1', name: 'Type of material', slotted: true},
      {id: '2', name: 'Tax ID / Authorized Dealer number', slotted: true},
      {id: '3', name: 'Name of the collecting entity', slotted: true},
      {id: '4', name: 'Capacity 100 ml to 1.499 liters', slotted: true},
      {id: '5', name: 'Capacity 1.5 to 5 liters', slotted: true}
    ]"
  ></igds-table-header>
  @for(rowId of rows; track rowId) {
    <igds-table-row [rowId]="rowId">
      <igds-table-cell>
        <igds-dropdown
          [options]="dropdownOptions"
          dir="ltr"
          placeholder="Select..."
          [disabled]="getFieldDisableState(rowId)"
        />
      </igds-table-cell>
      <igds-table-cell>
        <igds-input
          [disabled]="getFieldDisableState(rowId)"
          placeholder="Input 1"
          dir="ltr"
        >
        </igds-input>
      </igds-table-cell>
      <igds-table-cell>
        <igds-input
          [disabled]="getFieldDisableState(rowId)"
          placeholder="Input 2"
          dir="ltr"
        >
        </igds-input>
      </igds-table-cell>
      <igds-table-cell>
        <igds-input
          [disabled]="getFieldDisableState(rowId)"
          placeholder="Input 3"
          dir="ltr"
        >
        </igds-input>
      </igds-table-cell>
      <igds-table-cell>
        <igds-input
          [disabled]="getFieldDisableState(rowId)"
          placeholder="Input 4"
          dir="ltr"
        >
        </igds-input>
      </igds-table-cell>
    </igds-table-row>
  }
</igds-table>
